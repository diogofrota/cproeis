<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CPROEIS - Cursos</title>
  <link rel="stylesheet" href="../css/style-convenios-cursos.css">
</head>
<body>
  <header class="module-header">
    <div class="header-top">
      <div class="header-copy">
        <h1 id="page-title">Cursos</h1>
        <p id="page-subtitle">Selecione uma opção para cadastro ou consulta de cursos vinculados ao convênio.</p>
      </div>
    </div>

    <!--
      DESCRIÇÃO DO BLOCO: Menu hamburger padronizado do projeto. Ele concentra as opções
      de navegação no cabeçalho para manter a mesma experiência visual usada no GSI.
      PARÂMETROS E RETORNO: Não recebe parâmetros nem retorna valores; cada link encaminha
      para uma página HTML local ou para o retorno do módulo.
      ARMAZENAMENTO E PERSISTÊNCIA: Não lê nem grava dados; o estado aberto/fechado é
      controlado temporariamente no DOM pelo script da página.
      TODO: Em produção, ligar o item ativo à rota autenticada e aplicar permissões por perfil.
    -->
    <nav class="module-menu" id="convenios-cursos-menu" aria-label="Menu de cursos do convênio">
      <a id="menu-criar-curso" href="criar-curso.html">Criar curso</a>
      <a id="menu-historico-curso" href="historico-curso.html">Histórico de curso</a>
      <a href="../contratos/tabela-convenios.html">Consultar contrato</a>
      <a class="menu-logout-link" href="acesso.html" data-logout-convenio="true">Sair</a>
    </nav>
  </header>

  <main>
    <!--
      DESCRIÇÃO DO BLOCO: Barra superior de retorno para consulta do contrato, mantendo a mesma
      estrutura visual usada no menu operacional dos convênios.
      PARÂMETROS E RETORNO: Não recebe parâmetros nem retorna valores; oferece apenas navegação por link.
      ARMAZENAMENTO E PERSISTÊNCIA: Não lê nem grava dados; o destino aponta para a tela de contratos existente.
      TODO: Em produção, preservar o contrato selecionado via sessão autenticada em vez de depender de páginas estáticas.
    -->
    <div class="top-bar">
      <a class="back-link" href="../contratos/tabela-convenios.html">Consultar contrato</a>
    </div>

    <!--
      DESCRIÇÃO DO BLOCO: Menu inicial do módulo de cursos. Ele separa a futura criação de cursos
      da consulta histórica, permitindo desenvolver cada tela interna em arquivos próprios posteriormente.
      PARÂMETROS E RETORNO: Não recebe parâmetros nem retorna valores; disponibiliza dois pontos de navegação.
      ARMAZENAMENTO E PERSISTÊNCIA: Não utiliza LocalStorage, arrays locais, variáveis globais ou APIs nesta etapa.
      TODO: Substituir as âncoras temporárias por páginas reais com cadastro, histórico, validação e persistência em banco.
    -->
  </main>

  <script src="../js/script-convenios-cursos.js"></script>
  <script src="../js/script-convenios-session.js"></script>
  <script src="../js/script-navigation.js"></script>
</body>
</html>
