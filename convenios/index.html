<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CPROEIS - Convênios</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <a class="back-link" href="../index.html">Voltar para o início</a>
    <div class="header-copy">
      <h1>Convênios</h1>
      <p>Relação de convênios vigentes para acesso operacional.</p>
    </div>
  </header>

  <main>
    <section class="panel">
      <div class="panel-header">
        <div>
          <h2>Responsáveis com acesso operacional</h2>
          <p class="hint">Somente responsáveis vinculados a convênios vigentes aparecem nesta lista.</p>
        </div>
      </div>

      <div class="filter-bar access-filter-bar" aria-label="Filtros de responsáveis">
        <label>
          Pesquisar
          <input id="access-filter-text" type="search" placeholder="Nome do responsável">
        </label>

        <label>
          Convênio
          <select id="access-filter-convenio">
            <option value="">Todos</option>
          </select>
        </label>

        <label>
          Função
          <select id="access-filter-funcao">
            <option value="">Todas</option>
          </select>
        </label>

        <div class="form-actions filter-actions">
          <button type="button" class="secondary" id="clear-access-filters">Limpar filtros</button>
        </div>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Responsável</th>
              <th>Convênio</th>
              <th>CPF</th>
              <th>Email</th>
              <th>Telefone</th>
              <th>Funções</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="convenios-body"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
