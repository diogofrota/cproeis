<!DOCTYPE html>

<head>

  <title>CPROEIS - Menu do Convênio</title>

<body>
  <header class="module-header">
    <div class="header-top">
      <div class="header-copy">
        <h1 id="page-title">Menu do convênio</h1>
        <p id="page-subtitle">Selecione uma operação disponível para o convênio vigente.</p>
      </div>
    </div>

    <!--
      DESCRIÇÃO DO BLOCO: Menu hamburger padronizado do projeto. Ele concentra as opções
      de navegação no cabeçalho para manter a mesma experiência visual usada no GSI.
      PARÂMETROS E RETORNO: Não recebe parâmetros nem retorna valores; cada link encaminha
      para uma página HTML local ou para o retorno do módulo.
      ARMAZENAMENTO E PERSISTÊNCIA: Não lê nem grava dados; o estado aberto/fechado é
      controlado temporariamente no DOM pelo script da página.
      TODO: Em produção, ligar o item ativo à rota autenticada e aplicar permissões por perfil.
    -->
    <nav class="module-menu" id="convenios-menu" aria-label="Menu operacional do convênio">
      <a id="menu-criar-vagas" href="criar-vagas.html">Criar vagas de serviço</a>
      <a id="menu-acompanhamento" href="acompanhamento.html">Acompanhar limite mensal</a>
      <a id="menu-vagas" href="vagas.html">Vagas criadas</a>
      <a id="menu-criar-curso" href="criar-curso.html">Criar curso</a>
      <a id="menu-historico-curso" href="historico-curso.html">Histórico de curso</a>
      <a id="menu-detalhes-convenio" href="../contratos/detalhes-convenio.html">Detalhes do convênio</a>
      <a class="menu-logout-link" href="acesso.html" data-logout-convenio="true">Sair</a>
    </nav>
  </header>

  <main>
  </main>

  <script src="../js/script-convenios-session.js"></script>
  <script src="../js/script-navigation.js"></script>
</body>
</html>
