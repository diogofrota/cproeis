<!DOCTYPE html>

<head>

<body>
  <!--
    DESCRIÇÃO DO BLOCO: Página estrutural para cursos vinculados à P/1 Unidade.
    PARÂMETROS E RETORNO: Recebe id/unidade pela URL ou sessão local; não retorna valores.
    ARMAZENAMENTO E PERSISTÊNCIA: Lê sessão local em LocalStorage; não grava cursos nesta versão.
    TODO: Em produção, carregar cursos por API e aplicar regras de publicação.
  -->
  <header class="module-header">
    <div class="header-top"><div class="header-copy"><h1 id="p1-page-title" data-base-title="Cursos P/1">Cursos P/1</h1><p id="p1-page-subtitle">Cursos cadastrados pela unidade.</p></div></div>
    <nav class="module-menu" id="p1-unidade-menu" aria-label="Menu operacional da P/1 Unidade">
      <a href="operacao.html" data-p1-session-link>P/1 Unidade</a><a href="criar-curso.html" data-p1-session-link>Criar curso</a><a href="historico-curso.html" data-p1-session-link>Histórico de curso</a><a href="inscritos-curso.html" data-p1-session-link>Inscritos</a><a href="criar-vagas.html" data-p1-session-link>Criar vagas RAS</a><a class="menu-back-link" href="p1-unidade.html" data-history-back="false">Sair</a>
    </nav>
  </header>
  <main>
    <div class="session-status" id="p1-session-status"><strong>Validando acesso.</strong><span>Carregando vínculo P/1 RAS ativo.</span></div>
    <section class="card">
      <div class="section-heading"><h2>Cursos cadastrados</h2><p class="hint">Tabela pronta para cursos da P/1.</p></div>
      <div class="table-wrap"><table><thead><tr><th>Curso</th><th>Data</th><th>Vagas</th><th>Situação</th><th>Ações</th></tr></thead><tbody><tr><td class="empty-row" colspan="5">Nenhum curso cadastrado.</td></tr></tbody></table></div>
    </section>
  </main>
  <script src="../js/script-p1-unidade-session.js"></script><script src="../js/script-p1-unidade.js"></script><script src="../js/script-navigation.js"></script>
