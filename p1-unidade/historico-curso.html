<!DOCTYPE html>
<html lang="pt-BR">
<head>

<body>

    DESCRIÇÃO DO BLOCO: Página estrutural para histórico de cursos da P/1 Unidade.
    PARÂMETROS E RETORNO: Recebe id/unidade pela URL ou sessão local; não retorna valores.
    ARMAZENAMENTO E PERSISTÊNCIA: Lê sessão local em LocalStorage; não grava dados nesta tela.
    TODO: Em produção, registrar histórico de alterações em trilha auditável no banco.
  -->
  <header class="module-header">
    <div class="header-top"><div class="header-copy"><h1 id="p1-page-title" data-base-title="Histórico de curso P/1">Histórico de curso P/1</h1><p id="p1-page-subtitle">Movimentações de cursos da unidade.</p></div></div>
    <nav class="module-menu" id="p1-unidade-menu" aria-label="Menu operacional da P/1 Unidade">

  </header>
  <main>
    <div class="session-status" id="p1-session-status"><strong>Validando acesso.</strong><span>Carregando vínculo P/1 RAS ativo.</span></div>
    <section class="card">
      <div class="section-heading"><h2>Histórico</h2><p class="hint">Espaço reservado para eventos e alterações de cursos.</p></div>
      <div class="table-wrap"><table><thead><tr><th>Data</th><th>Curso</th><th>Ação</th><th>Responsável</th></tr></thead><tbody><tr><td class="empty-row" colspan="4">Nenhum histórico registrado.</td></tr></tbody></table></div>
    </section>
  </main>
  <script src="../js/script-p1-unidade-session.js"></script><script src="../js/script-p1-unidade.js"></script><script src="../js/script-navigation.js"></script>
