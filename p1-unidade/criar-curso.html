<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CPROEIS - Criar Curso P/1</title>
  <link rel="stylesheet" href="../css/style-p1-unidade.css">
</head>
<body>
  <!--
    DESCRIÇÃO DO BLOCO: Página estrutural para criação de cursos pela P/1 Unidade, mantendo o
    mesmo mapa de telas existente no convênio.
    PARÂMETROS E RETORNO: Recebe id/unidade pela URL ou sessão local; não retorna valores.
    ARMAZENAMENTO E PERSISTÊNCIA: Lê sessão P/1 no LocalStorage; não grava cursos nesta versão.
    TODO: Em produção, definir se cursos da P/1 usam fluxo próprio ou reaproveitam API de cursos.
  -->
  <header class="module-header">
    <div class="header-top"><div class="header-copy"><h1 id="p1-page-title" data-base-title="Criar curso P/1">Criar curso P/1</h1><p id="p1-page-subtitle">Cadastro estrutural de curso da unidade.</p></div></div>
    <nav class="module-menu" id="p1-unidade-menu" aria-label="Menu operacional da P/1 Unidade">
      <a href="operacao.html" data-p1-session-link>P/1 Unidade</a><a href="cursos.html" data-p1-session-link>Cursos</a><a href="historico-curso.html" data-p1-session-link>Histórico de curso</a><a href="inscritos-curso.html" data-p1-session-link>Inscritos</a><a href="criar-vagas.html" data-p1-session-link>Criar vagas RAS</a><a class="menu-back-link" href="p1-unidade.html" data-history-back="false">Sair</a>
    </nav>
  </header>
  <main>
    <div class="session-status" id="p1-session-status"><strong>Validando acesso.</strong><span>Carregando vínculo P/1 RAS ativo.</span></div>
    <section class="card">
      <div class="section-heading"><h2>Novo curso</h2><p class="hint">Estrutura pronta para ajustes futuros.</p></div>
      <form class="p1-form-grid"><label>Nome do curso<input type="text" placeholder="Ex: Nivelamento operacional"></label><label>Data<input type="date"></label><label>Vagas<input type="number" min="1"></label><label>Situação<select><option>Rascunho</option><option>Publicado</option></select></label></form>
    </section>
  </main>
  <script src="../js/script-p1-unidade-session.js"></script><script src="../js/script-p1-unidade.js"></script><script src="../js/script-navigation.js"></script>
</body>
</html>
