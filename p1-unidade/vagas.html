<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CPROEIS - Vagas P/1</title>
  <link rel="stylesheet" href="../css/style-convenios-criar-vagas.css">
  <link rel="stylesheet" href="../css/style-p1-unidade.css">
</head>
<body>
  <!--
    DESCRIÇÃO DO BLOCO: Página de consulta das vagas RAS criadas pela P/1 Unidade, seguindo a
    lógica de listagem do acesso de convênio.
    PARÂMETROS E RETORNO: Recebe id/unidade pela URL ou sessão local; não retorna valores.
    ARMAZENAMENTO E PERSISTÊNCIA: O script lê cproeis_ras_vagas no LocalStorage.
    TODO: Em produção, consultar vagas por API com status oficial do GSI, filtros e paginação.
  -->
  <header class="module-header">
    <div class="header-top">
      <div class="header-copy">
        <h1 id="p1-page-title" data-base-title="Vagas criadas">Vagas criadas</h1>
        <p id="p1-page-subtitle">Vagas RAS criadas pela P/1 Unidade.</p>
      </div>
    </div>

    <nav class="module-menu" id="p1-unidade-menu" aria-label="Menu operacional da P/1 Unidade"></nav>
  </header>

  <main>
    <section class="panel">
      <div class="panel-header">
        <div>
          <h2>Vagas criadas</h2>
          <p class="hint" id="p1-vagas-count">Nenhuma vaga criada.</p>
        </div>
        <a class="button-link ghost" href="criar-vagas.html" data-p1-session-link>Criar vagas</a>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Data</th>
              <th>Serviço</th>
              <th>Classe</th>
              <th>Carga horária</th>
              <th>Tipo</th>
              <th>Compulsório</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="p1-vagas-body">
            <tr><td class="empty-row" colspan="7">Nenhuma vaga criada para a unidade.</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="../js/script-p1-unidade-session.js"></script>
  <script src="../js/script-p1-unidade-vagas.js"></script>
  <script src="../js/script-p1-unidade.js"></script>
  <script src="../js/script-navigation.js"></script>
</body>
</html>
