<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CPROEIS - Retirar Responsável</title>
  <link rel="stylesheet" href="../css/style-contratos-cadastrar-convenio.css">
</head>
<body>
  <!--
    DESCRIÇÃO DO BLOCO: Página exclusiva para registrar data final de responsável vinculado a convênio.
    PARÂMETROS E RETORNO: Não recebe parâmetros HTML obrigatórios; o usuário seleciona convênio e
    responsável no formulário e o JavaScript grava a data final.
    ARMAZENAMENTO E PERSISTÊNCIA: O script lê contratos pela camada JSON local e salva
    a retirada em sessionStorage até a confirmação da revisão.
    TODO: Em produção, transformar esta alteração cadastral em endpoint auditado com autenticação do operador.
  -->
  <header class="module-header">
    <div class="header-top">
      <div class="header-copy">
        <h1>Contrato</h1>
      </div>
    </div>

    <nav class="module-menu" id="contratos-menu" aria-label="Funcionalidades de contratos">
      <a class="tab-button" href="index.html" data-history-back="false">Página inicial</a>
      <a class="tab-button" href="cadastrar-convenio.html">Cadastrar convênio</a>
      <a class="tab-button" href="tabela-convenios.html">Tabela Convênios</a>
      <a class="tab-button" href="tabela-responsaveis.html">Tabela Responsáveis</a>
      <a class="tab-button" href="incluir-responsavel.html">Adicionar responsável</a>
      <a class="tab-button active" href="retirar-responsavel.html">Retirar responsável</a>
      <a class="tab-button" href="renovacoes.html">Renovações</a>
    </nav>
  </header>

  <main>
    <section class="view active">
      <div class="panel">
        <div class="panel-header">
          <div>
            <h2 id="retirar-page-title">Retirada de responsável</h2>
            <p class="hint" id="retirar-page-subtitle">Selecione o convênio e o responsável que terá uma data final registrada.</p>
          </div>
        </div>

        <form id="retirar-responsavel-form">
          <label class="full">
            Convênio
            <select id="retirar-convenio"></select>
            <small class="field-hint hidden" id="retirar-convenio-hint">Selecione o contrato.</small>
          </label>

          <label class="wide">
            Responsável
            <select id="retirar-responsavel"></select>
            <small class="field-hint hidden" id="retirar-responsavel-hint">Selecione um responsável sem data final.</small>
          </label>

          <label>
            Data final
            <input id="retirar-data-final" type="date">
            <small class="field-hint hidden" id="retirar-data-final-hint">Informe uma data final dentro da vigência do contrato.</small>
          </label>

          <div class="form-actions wide">
            <button type="submit" class="danger">Retirar responsável</button>
            <button type="button" class="secondary" id="cancel-retirar-responsavel">Cancelar</button>
          </div>
        </form>
      </div>
    </section>
  </main>

  <script src="../js/script-contratos-json-api.js"></script>
  <script src="../js/script-contratos-retirar-responsavel.js"></script>
  <script src="../js/script-navigation.js"></script>
</body>
</html>
