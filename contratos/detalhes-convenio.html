<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CPROEIS - Detalhes do Convênio</title>
  <link rel="stylesheet" href="../css/style-contratos-cadastrar-convenio.css">
  <link rel="stylesheet" href="../css/style-contratos-revisar-convenio.css">
</head>
<body>
  <!--
    DESCRIÇÃO DO BLOCO: Página de consulta detalhada do convênio dentro do módulo de Contratos.
    Ela é aberta pelo clique de Detalhes na tabela de contratos e mantém a navegação administrativa.
    PARÂMETROS E RETORNO: Recebe o identificador do convênio pelo parâmetro `id` da URL e não
    retorna valores; o JavaScript renderiza os dados no painel abaixo.
    ARMAZENAMENTO E PERSISTÊNCIA: Lê os dados em `cproeis_contratos_convenios`,
    `cproeis_contratos_valores`, `cproeis_contratos_responsaveis`,
    `cproeis_contratos_limites_vagas`, `cproeis_gsi_usuarios_contrato` e
    `cproeis_gsi_usuarios_contrato_removidos` no LocalStorage.
    TODO: Em produção, substituir o parâmetro local por rota autenticada e buscar os detalhes em API segura.
  -->
  <header class="module-header">
    <div class="header-top">
      <div class="header-copy">
        <h1 id="page-title">Contrato</h1>
      </div>
    </div>

    <nav class="module-menu" id="contratos-menu" aria-label="Funcionalidades de contratos">
      <a class="tab-button" href="index.html" data-history-back="false">Página inicial</a>
      <a class="tab-button" href="cadastrar-convenio.html">Cadastrar convênio</a>
      <a class="tab-button active" href="tabela-convenios.html">Tabela Convênios</a>
      <a class="tab-button" href="tabela-responsaveis.html">Tabela Responsáveis</a>
      <a class="tab-button" href="incluir-responsavel.html">Adicionar responsável</a>
      <a class="tab-button" href="retirar-responsavel.html">Retirar responsável</a>
      <a class="tab-button" href="renovacoes.html">Renovações</a>
    </nav>
  </header>

  <main>
    <section class="view active" id="detalhes-view">
      <div class="panel" id="details-empty" hidden>
        <h2>Detalhes do convênio</h2>
        <p class="hint">Nenhum convênio foi informado para consulta.</p>
      </div>

      <div class="panel review-panel details-review-panel" id="details-panel">
        <div class="panel-header">
          <div>
            <h2 id="details-heading">Detalhes do convênio</h2>
            <p class="hint" id="details-subtitle"></p>
          </div>
        </div>

        <div id="details-content"></div>
      </div>
    </section>
  </main>

  <script src="../js/script-contratos-json-api.js"></script>
  <script src="../js/script-contratos-tabela-convenios.js"></script>
  <script src="../js/script-navigation.js"></script>
</body>
</html>
