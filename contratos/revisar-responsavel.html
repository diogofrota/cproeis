<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CPROEIS - Revisar responsável</title>
  <link rel="stylesheet" href="../css/style-contratos-cadastrar-convenio.css">
  <link rel="stylesheet" href="../css/style-contratos-revisar-convenio.css">
</head>
<body>
  <!--
    DESCRIÇÃO DO BLOCO: Página de conferência para inclusão ou retirada de responsável antes
    da alteração definitiva no armazenamento local.
    PARÂMETROS E RETORNO: Não recebe parâmetros obrigatórios; o JavaScript lê o rascunho em
    `cproeis_contratos_revisao_responsavel` no sessionStorage.
    ARMAZENAMENTO E PERSISTÊNCIA: Lê rascunho JSON no sessionStorage e, após confirmação,
    envia para a camada JSON local que simula a API de inclusão/retirada de responsável.
    TODO: Em produção, substituir por endpoint transacional auditado para inclusão/retirada de acesso.
  -->
  <header class="module-header">
    <div class="header-top">
      <div class="header-copy">
        <h1>Revisar responsável</h1>
        <p>Conferência da alteração antes de confirmar o envio.</p>
      </div>
    </div>

    <nav class="module-menu" id="contratos-menu" aria-label="Funcionalidades de contratos">
      <a class="tab-button" href="index.html" data-history-back="false">Página inicial</a>
      <a class="tab-button" href="cadastrar-convenio.html">Cadastrar convênio</a>
      <a class="tab-button" href="tabela-convenios.html">Tabela Convênios</a>
      <a class="tab-button" href="incluir-responsavel.html">Adicionar responsável</a>
      <a class="tab-button" href="retirar-responsavel.html">Retirar responsável</a>
      <a class="tab-button" href="renovacoes.html">Renovações</a>
    </nav>
  </header>

  <main>
    <section class="panel review-panel">
      <div class="panel-header review-header">
        <div>
          <h2>Conferência antes do envio</h2>
          <p class="hint" id="responsavel-review-status">Confira os dados abaixo antes de confirmar a alteração.</p>
        </div>
      </div>

      <div id="responsavel-review-content" class="review-content"></div>

      <div class="form-actions submit-actions review-actions">
        <button type="button" class="secondary" id="responsavel-review-edit">Voltar para corrigir</button>
        <button type="button" id="responsavel-review-confirm">Confirmar e enviar</button>
      </div>
    </section>
  </main>

  <script src="../js/script-contratos-json-api.js"></script>
  <script src="../js/script-contratos-revisar-responsavel.js"></script>
  <script src="../js/script-navigation.js"></script>
</body>
</html>
