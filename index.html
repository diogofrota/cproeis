<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CPROEIS - Sistema</title>
  <link rel="stylesheet" href="css/style-index.css">
</head>
<body id="topo">
  <header>
    <h1>Sistema CPROEIS</h1>
    <p>Selecione uma opção do sistema.</p>
  </header>

  <main>
    <!--
      DESCRIÇÃO DO BLOCO: Menu raiz unificado do sistema. Ele reúne os acessos gerais e as opções
      administrativas que antes ficavam em página separada, reduzindo uma etapa de navegação.
      PARÂMETROS E RETORNO: Não recebe parâmetros nem retorna valores; cada link direciona para
      uma página HTML própria já preparada para futura rota.
      ARMAZENAMENTO E PERSISTÊNCIA: Não lê nem grava dados; funciona apenas como navegação estática.
      TODO: Em produção, aplicar controle de perfil para ocultar opções administrativas sem permissão.
    -->
    <nav aria-label="Módulos e opções do sistema">
      <a href="cadastro-policial/cadastro.html">Base de Dados</a>
      <a href="gsi/menu.html">GSI</a>
      <a href="bloqueio-desbloqueio/bloqueio-desbloqueio.html">Bloqueio / Desbloqueio</a>
      <a href="fopag/fopag.html">FOPAG</a>
      <a href="contratos/cadastrar-convenio.html">Contratos</a>
      <a href="acesso-comandante/acesso-comandante.html">Acesso Comandante</a>
      <a href="convenios/acesso.html">Acesso do Convênio</a>
      <a href="acesso-policial/acesso.html">Acesso do Policial</a>
      <a href="p1-unidade/p1-unidade.html">P/1 Unidade</a>
    </nav>

    <!--
      DESCRIÇÃO DO BLOCO: Ferramentas locais de demonstração para facilitar testes do protótipo.
      Os cadastros foram separados em ações independentes para permitir carregar contratos ou
      policiais sem sobrescrever a outra base de dados. A geração inicial segue o fluxo real:
      primeiro serviços do convênio, depois vagas do mês atual usando os serviços cadastrados.
      PARÂMETROS E RETORNO: Não recebe parâmetros nem retorna valores; os botões acionam rotinas
      JavaScript que carregam contratos, policiais, serviços, vagas do mês atual ou limpam o armazenamento local.
      ARMAZENAMENTO E PERSISTÊNCIA: As ações gravam e removem dados somente em chaves cproeis_* do
      LocalStorage do navegador atual.
      TODO: Em produção, remover esta área da página pública e substituir por seeds controlados
      em ambiente de homologação.
    -->
    <section class="demo-tools" aria-label="Ferramentas de teste local">
      <div class="demo-actions">
        <button type="button" id="seed-demo-contratos">Carregar contratos</button>
        <button type="button" id="seed-demo-policiais">Carregar policiais</button>
        <button type="button" id="seed-demo-servicos">Criar serviços demo</button>
        <button type="button" id="seed-demo-vagas-mes-atual">Criar vagas mês atual</button>
        <button type="button" class="danger-demo" id="clear-demo-cache">Limpar cache</button>
      </div>
    </section>
  </main>
  <script src="js/script-navigation.js"></script>
  <script src="dados-simulados/dados-contratos-demo.js"></script>
  <script src="dados-simulados/dados-policiais-demo.js"></script>
  <script src="dados-simulados/dados-cursos-demo.js"></script>
  <script src="dados-simulados/dados-vagas-mes-atual-demo.js"></script>
  <script src="dados-simulados/dados-vagas-mes-anterior-demo.js"></script>
  <script src="dados-simulados/dados-vagas-com-curso-demo.js"></script>
  <script src="js/script-index-demo-data.js"></script>
</body>
</html>
